name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (compile + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Byte-compile backend
        # Catches syntax/import-shape errors. Full integration tests need a live
        # server + Supabase/Clerk/OpenRouter and are not run in CI.
        run: python -m compileall backend
      - name: Lint (syntax errors only)
        run: |
          pip install flake8
          flake8 backend --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,__pycache__

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          CI: "false"
        run: npm run build
